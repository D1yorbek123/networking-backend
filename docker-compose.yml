version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crm-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: crm-system
    volumes:
      - mongodb-data:/data/db
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb+srv://diyorbekprimqulov334_db_user:UOzco2h2KMOWIp9a@cluster0.83jhfgo.mongodb.net/Networking?appName=Cluster0
      MONGODB_LOCAL: mongodb://localhost:27017/crm-system
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-12345
      JWT_EXPIRE: 7d
      MONGODB_DNS_SERVERS: 8.8.8.8,1.1.1.1
      ENABLE_DEMO_ACCOUNTS: "true"
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crm-network
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://backend:5000
    container_name: crm-frontend
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - crm-network
    command: npm start

volumes:
  mongodb-data:

networks:
  crm-network:
    driver: bridge
