version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crm-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: crm-system
    volumes:
      - mongodb-data:/data/db
    networks:
      - crm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb+srv://abdukarim:abdukarim@cluster0.1cphvgq.mongodb.net/crm-system?appName=Cluster0
      MONGODB_LOCAL: mongodb://localhost:27017/crm-system
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-12345
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crm-network
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - crm-network
    command: npm start

volumes:
  mongodb-data:

networks:
  crm-network:
    driver: bridge
