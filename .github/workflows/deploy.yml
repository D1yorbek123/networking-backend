name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            # 1. Serverdagi lokal o'zgarishlarni tashlab yuborish va GitHub'dagi versiyani majburan olish
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Container'larni o'chirish
            docker compose down
            
            # 3. Keshni ishlatmasdan, butunlay yangidan build qilish
            docker compose build --no-cache
            docker compose up -d